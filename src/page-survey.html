<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>간단 설문 — AIA SKT 이벤트</title>
	<link rel="shortcut icon" href="./favicon.ico">
</head>

<body class="page-survey" data-page="survey">
	<!-- 다른 타입: .survey-hero-text / .survey-visual img / .pick-card 문구·이미지 경로만 교체 -->
	<div class="wrap">
		<header class="header">
			<h1 class="logo">
				<a href="./list.html" aria-label="AIA">
					<img src="./images/logo.svg" width="120" height="22" alt="AIA">
				</a>
			</h1>
		</header>

		<section class="survey-hero-text" aria-label="이벤트 안내">
			<p class="survey-kicker">지금 바로</p>
			<p class="survey-title-line">간단 설문 참여하고</p>
			<p class="survey-title-line"><span class="accent">100% 선물</span> 받아가세요!</p>
		</section>

		<div class="survey-visual">
			<img src="./images/visual.svg" width="335" height="180" alt="">
		</div>

		<section class="survey-question">
			<p class="survey-question__pre">치과에서</p>
			<p class="survey-question__main"><span class="accent">나를 가장 안심시켜</span> 주는 것은?</p>
			<p class="survey-question__sub">간단한 치과 설문 참여하고 경품 받아가세요.</p>
		</section>

		<div class="pick-cards" role="group" aria-label="관심 상품 선택">
			<button type="button" class="pick-card pick-card--active" data-pick="insurance" aria-pressed="true">
				<span class="pick-card__icon" aria-hidden="true">
					<img src="./images/feature-1.svg" width="72" height="72" alt="">
				</span>
				<span class="pick-card__caption">목돈 나갈 걱정 덜어주는</span>
				<span class="pick-card__title">치아보험</span>
			</button>
			<button type="button" class="pick-card" data-pick="doll" aria-pressed="false">
				<span class="pick-card__icon" aria-hidden="true">
					<img src="./images/feature-2.svg" width="72" height="72" alt="">
				</span>
				<span class="pick-card__caption">치료 시 가슴에 안겨주는</span>
				<span class="pick-card__title">귀여운 인형</span>
			</button>
			<button type="button" class="pick-card" data-pick="explain" aria-pressed="false">
				<span class="pick-card__icon" aria-hidden="true">
					<img src="./images/feature-3.svg" width="72" height="72" alt="">
				</span>
				<span class="pick-card__caption">꼼꼼한 치과 의사의</span>
				<span class="pick-card__title">친절한 설명</span>
			</button>
		</div>

		<p class="survey-footer-note">관심상품을 선택하면 경품 선택페이지로 이동 됩니다.</p>
	</div>

	<script src="./js/main.js" type="module"></script>
</body>

</html>
