<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>AIA SKT 이벤트</title>
	<link rel="shortcut icon" href="./favicon.ico">
</head>

<body class="page-survey" data-page="survey">
	<div class="wrap">
		<header class="header">
			<h1 class="logo">
				<a href="#">
					<span class="sr-only">AIA HEALTHIER, LONGER, BETTER LIVES</span>
				</a>
			</h1>
		</header>

		<section class="survey-hero-text" aria-label="이벤트 안내">
			<p class="survey-kicker">지금 바로</p>
			<p class="survey-title-line"><b>간단 설문 참여</b><em>하고</em></p>
			<p class="survey-title-line"><span class="accent">100% 선물</span> 받아가세요!</p>
		</section>

		<div class="survey-visual">
			<img src="./images/visual.svg" alt="AIA SKT 이벤트 비주얼">
		</div>

		<section class="survey-question">
			<p class="survey-question__pre"><b>치과</b>에서</p>
			<p class="survey-question__main"><span class="accent">나를 가장 안심시켜</span> 주는 것은?</p>
			<p class="survey-question__sub">간단한 치과 설문 참여하고 경품 받아가세요.</p>
		</section>

		<div class="pick-cards" role="group" aria-label="관심 상품 선택">
			<!-- pick-card--active 클래스 추가하면 활성화 됨 aria-pressed="true" 변경!-->
			<button type="button" class="pick-card" aria-label="치아보험" aria-pressed="false">
				<span class="pick-card__icon" aria-hidden="true">
					<img src="./images/feature-1.png" alt="">
					<img src="./images/feature-1-active.png" alt="">
				</span>
			</button>
			<button type="button" class="pick-card" aria-label="귀여운 인형" aria-pressed="false">
				<span class="pick-card__icon" aria-hidden="true">
					<img src="./images/feature-2.png" alt="">
					<img src="./images/feature-2-active.png" alt="">
				</span>
			</button>
			<button type="button" class="pick-card" aria-label="친절한 설명" aria-pressed="false">
				<span class="pick-card__icon" aria-hidden="true">
					<img src="./images/feature-3.png" alt="">
					<img src="./images/feature-3-active.png" alt="">
				</span>
			</button>
		</div>

		<p class="survey-footer-note">관심상품을 선택하면 경품 선택페이지로 이동 됩니다.</p>
	</div>

	<script src="./js/main.js" type="module"></script>
	<script>
		(function () {
			document.querySelectorAll(".pick-card").forEach(function (btn) {
				btn.addEventListener("click", function () {
					document.querySelectorAll(".pick-card").forEach(function (b) {
						b.classList.remove("pick-card--active");
						b.setAttribute("aria-pressed", "false");
					});
					btn.classList.add("pick-card--active");
					btn.setAttribute("aria-pressed", "true");
				});
			});
		})();
	</script>
</body>

</html>
