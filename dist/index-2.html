<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>AIA SKT 이벤트</title>
	<link rel="shortcut icon" href="./favicon.ico">
  <script crossorigin src="./assets/js/main.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/css/main.css">
</head>

<body class="page-survey page-survey-2" data-page="survey">
	<div class="wrap">
		<header class="header">
			<h1 class="logo">
				<a href="#">
					<span class="sr-only">AIA HEALTHIER, LONGER, BETTER LIVES</span>
				</a>
			</h1>
		</header>

		<section class="survey-hero-text" aria-label="이벤트 안내">
			<p class="survey-kicker">지금 바로</p>
			<p class="survey-title-line"><b>관심상품</b><em>을</em> <b>선택</b><em>하고</em></p>
			<p class="survey-title-line"><span class="accent">100% 선물</span> 받아가세요!</p>
		</section>

		<div class="survey-visual">
			<img src="./images/visual-2.svg" alt="AIA SKT 이벤트 비주얼">
		</div>
		
		
		<section class="survey-question">
			<p class="survey-question__pre"><b>건강이 걱정</b>될 때,</p>
			<p class="survey-question__main"><span class="accent">지금 꼭 필요한 보험</span>을 선택하세요!</p>
			<!-- <p class="survey-question__sub">간단한 치과 설문 참여하고 경품 받아가세요.</p> -->
		</section>

		<div class="pick-cards" role="group" aria-label="관심 상품 선택">
			<!-- pick-card--active 클래스 추가하면 활성화 됨 aria-pressed="true" 변경!-->
			<button type="button" class="pick-card" aria-label="치아보험" aria-pressed="false">
				<span class="pick-card__icon" aria-hidden="true">
					<img src="./images/feature-4.png" alt="">
					<img src="./images/feature-4-active.png" alt="">
				</span>
			</button>
			<button type="button" class="pick-card" aria-label="귀여운 인형" aria-pressed="false">
				<span class="pick-card__icon" aria-hidden="true">
					<img src="./images/feature-5.png" alt="">
					<img src="./images/feature-5-active.png" alt="">
				</span>
			</button>
			<button type="button" class="pick-card" aria-label="친절한 설명" aria-pressed="false">
				<span class="pick-card__icon" aria-hidden="true">
					<img src="./images/feature-6.png" alt="">
					<img src="./images/feature-6-active.png" alt="">
				</span>
			</button>
		</div>

		<p class="survey-footer-note">관심상품을 선택하면 경품 선택페이지로 이동 됩니다.</p>
	</div>

</body>

</html>
